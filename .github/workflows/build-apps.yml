name: Build Mobile Apps

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Install dependencies
        run: npm install

      - name: Build Next.js App
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Android APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug
        working-directory: android

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: video-to-pdf-android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    name: Build iOS IPA (Unsigned)
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build Next.js App
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Setup CocoaPods
        run: pod install
        working-directory: ios/App

      - name: Build iOS App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            build
        working-directory: ios/App

      - name: Package to IPA (Unsigned)
        run: |
          mkdir Payload
          mv ios/App/build/Release-iphoneos/App.app Payload/
          zip -r video-to-pdf-ios.ipa Payload

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: video-to-pdf-ios-ipa
          path: video-to-pdf-ios.ipa
