name: Build iOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js App
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Setup CocoaPods
        run: pod install
        working-directory: ios/App

      - name: Build iOS App (Simulator/Unsigned)
        # Note: A real .ipa build requires Apple Developer Certificates and Provisioning Profiles.
        # This step successfully compiles the app to ensure everything works on iOS, 
        # and packages an unsigned .app which can be tested on the iOS Simulator.
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
        working-directory: ios/App

      - name: Upload iOS App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: ios/App/build/Release-iphonesimulator/App.app
